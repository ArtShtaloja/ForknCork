<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fork n Cork - Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <i class="fas fa-utensils"></i>
        <h1>Fork <em>n</em> Cork</h1>
        <p>Admin Panel</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="login-email"
              name="email"
              required
              placeholder="admin@forkncork.com"
              autocomplete="email"
            >
          </div>
          <span class="form-error" id="login-email-error"></span>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="login-password"
              name="password"
              required
              placeholder="Enter your password"
              autocomplete="current-password"
            >
            <button
              type="button"
              class="password-toggle"
              id="password-toggle"
              aria-label="Toggle password visibility"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="login-password-error"></span>
        </div>

        <div class="form-feedback hidden" id="login-feedback"></div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          Sign In
        </button>
      </form>

      <!-- Footer Links -->
      <div class="auth-footer">
        <a href="/">
          <i class="fas fa-arrow-left"></i> Back to Website
        </a>
      </div>

    </div>
  </div>

  <!-- ======================================================================
       SCRIPTS
       ====================================================================== -->
  <script src="/js/admin-login.js"></script>

</body>
</html>
