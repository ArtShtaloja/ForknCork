<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fork n Cork - Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 50% 100%, rgba(255, 107, 0, 0.06) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Grid pattern overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Login container */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* Card */
    .login-card {
      background: rgba(15, 15, 25, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 48px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 20px 50px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(99, 102, 241, 0.05);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform: translateY(20px);
      opacity: 0;
    }

    @keyframes cardIn {
      to { transform: translateY(0); opacity: 1; }
    }

    /* Logo area */
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-brand .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #fff;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      animation: iconGlow 3s ease-in-out infinite alternate;
    }

    @keyframes iconGlow {
      0% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3); }
      100% { box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5), 0 0 60px rgba(99, 102, 241, 0.1); }
    }

    .login-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .login-brand h1 em {
      font-style: italic;
      color: #6366f1;
    }

    .login-brand p {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Divider */
    .login-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin-bottom: 32px;
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i.input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.9rem;
      transition: color 0.3s;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 48px 14px 46px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .input-wrapper input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1), 0 0 20px rgba(99, 102, 241, 0.05);
    }

    .input-wrapper input:focus ~ i.input-icon {
      color: #6366f1;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: rgba(255, 255, 255, 0.5);
    }

    .form-error {
      font-size: 0.78rem;
      color: #ef4444;
      min-height: 0;
      transition: all 0.2s;
    }

    .field-error {
      font-size: 0.78rem;
      color: #ef4444;
      margin-top: 4px;
    }

    .input-wrapper input.is-invalid {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.06);
    }

    /* Error alert */
    .login-error {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #f87171;
      text-align: center;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
    }

    /* Submit button */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4), 0 0 60px rgba(99, 102, 241, 0.1);
    }

    .login-btn:hover:not(:disabled)::before {
      transform: translateX(100%);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .login-footer a {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .login-footer a:hover {
      color: #6366f1;
    }

    /* Security badge */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 0.04em;
    }

    .security-badge i {
      font-size: 0.65rem;
      color: #10b981;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 28px 32px;
        border-radius: 16px;
      }

      .login-brand .brand-icon {
        width: 56px;
        height: 56px;
        font-size: 1.4rem;
      }

      .login-brand h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>

  <!-- Login Card -->
  <div class="login-container">
    <div class="login-card">

      <div class="login-brand">
        <div class="brand-icon">
          <i class="fas fa-utensils"></i>
        </div>
        <h1>Fork <em>n</em> Cork</h1>
        <p>Management Dashboard</p>
      </div>

      <div class="login-divider"></div>

      <form id="login-form" class="login-form" novalidate>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="login-email"
              name="email"
              required
              placeholder="admin@forkncork.com"
              autocomplete="email"
            >
            <i class="fas fa-envelope input-icon"></i>
          </div>
          <span class="form-error" id="login-email-error"></span>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="login-password"
              name="password"
              required
              placeholder="Enter your password"
              autocomplete="current-password"
            >
            <i class="fas fa-lock input-icon"></i>
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="login-password-error"></span>
        </div>

        <div class="login-error" id="login-error"></div>

        <button type="submit" class="login-btn" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="login-footer">
        <a href="/">
          <i class="fas fa-arrow-left"></i> Back to Website
        </a>
        <div class="security-badge">
          <i class="fas fa-shield-alt"></i>
          Secured admin access
        </div>
      </div>

    </div>
  </div>

  <script>
    // Floating particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
      }
    })();

    // Password toggle
    const toggleBtn = document.getElementById('password-toggle');
    const passInput = document.getElementById('login-password');
    if (toggleBtn && passInput) {
      toggleBtn.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        toggleBtn.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
      });
    }
  </script>
  <script src="/js/admin-login.js"></script>
</body>
</html>
